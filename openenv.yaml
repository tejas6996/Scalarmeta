name: disaster-relief-coordination
version: "1.0.0"
tags:
  - openenv
  - disaster-relief
  - multi-agent
  - coordination
description: >
  An OpenEnv-compatible environment where an LLM coordinator triages
  disaster reports, allocates limited resources (ambulances, boats,
  helicopters, medical teams), and resolves incidents under time pressure,
  uncertainty, and flood conditions.

author: "participant"
license: MIT

# ---------------------------------------------------------------------------
# Observation space
# ---------------------------------------------------------------------------
observation:
  type: object
  description: "Snapshot of the disaster coordination state at each step."
  properties:
    step:
      type: integer
      minimum: 0
      description: "Current simulation step (0-based)."
    max_steps:
      type: integer
      description: "Total steps in the episode."
    task_name:
      type: string
      description: "Name of the current task."
    pending_reports:
      type: array
      description: "Reports visible to the agent that have not been resolved/expired."
      items:
        type: object
        properties:
          id: { type: string }
          raw_text: { type: string }
          zone_id: { type: string }
          category: { type: string }
          urgency: { type: integer, minimum: 0, maximum: 10 }
          status: { type: string, enum: [pending, triaged, dispatched] }
          is_critical: { type: boolean }
          deadline_step: { type: integer, nullable: true }
          classified: { type: boolean }
          verified: { type: boolean }
          verification_confidence: { type: number, nullable: true }
    active_assignments:
      type: array
      description: "Currently active resource-to-report assignments."
    available_resources:
      type: array
      description: "All resources and their current status."
      items:
        type: object
        properties:
          id: { type: string }
          type: { type: string, enum: [ambulance, rescue_boat, supply_truck, medical_team, helicopter, engineering_crew] }
          status: { type: string, enum: [available, deployed, returning] }
          can_traverse_flood: { type: boolean }
    zones:
      type: array
      description: "Zone conditions — flood depth, access, communications."
      items:
        type: object
        properties:
          id: { type: string }
          name: { type: string }
          severity: { type: integer, minimum: 1, maximum: 5 }
          flood_depth_level: { type: integer, minimum: 0, maximum: 3 }
          access_blocked: { type: boolean }
          comms_blackout: { type: boolean }
    recent_changes:
      type: array
      items: { type: string }
      description: "What changed since the last step."
    warnings:
      type: array
      items: { type: string }
      description: "Urgent warnings about deadlines, stuck resources, etc."
    available_tools:
      type: array
      items: { type: string }
      description: "Tool names the agent can call."
    last_action_result:
      type: string
      nullable: true
      description: "Feedback from the previous tool call."
    last_action_error:
      type: string
      nullable: true
      description: "Error if the previous action was invalid."
    weather_severity:
      type: integer
      minimum: 1
      maximum: 5
    situation_brief:
      type: string
      nullable: true
      description: "Concise crisis summary generated at episode start (step 0 only)."

# ---------------------------------------------------------------------------
# Action space
# ---------------------------------------------------------------------------
action:
  type: object
  description: "A tool call issued by the LLM coordinator each step."
  properties:
    tool:
      type: string
      description: "Name of the tool to invoke."
      enum:
        - call_intake_agent
        - call_dispatch_agent
        - call_monitor_agent
        - classify_report
        - assess_report_urgency
        - verify_report
        - get_resources
        - send_resource
        - reroute_resource
        - check_operation
        - close_case
        - mark_false_report
    args:
      type: object
      description: "Arguments for the tool call (varies per tool)."

# ---------------------------------------------------------------------------
# Reward
# ---------------------------------------------------------------------------
reward:
  type: number
  description: >
    Per-step scalar reward. Base +0.1 per step.
    Triage actions: +1.0 classify, +1.0 urgency, +0.5 verify.
    Dispatch: +2.0 correct type, -1.0 wrong type, -1.0 false/duplicate.
    False flagging: +1.0 correct, -1.5 wrong, -2.0 flagging critical.
    Temporal multiplier: 2.0x→1.0x urgency bonus as deadline approaches.
    Penalties: -0.5 malformed, -0.5 errors, -0.5 repeat actions.

# ---------------------------------------------------------------------------
# Tasks
# ---------------------------------------------------------------------------
tasks:
  - name: task1_flood_easy
    difficulty: easy
    description: >
      Single zone, 6 reports (2 critical), 5 resources.
      Low flood depth, no blockages or blackouts.
      Introduces the basic triage→dispatch→monitor loop.
    max_steps: 12
    score_range: [0.0, 1.0]
    grader: "40% resolution + 30% critical + 30% efficiency"

  - name: task2_storm_medium
    difficulty: medium
    description: >
      3 zones, 11 reports (3 critical, 1 duplicate, 2 false), 6 resources.
      Flood depth up to 2, road blockages, comms blackouts.
      Requires false alarm detection (F1-score), resource type matching,
      and counterfactual analysis.
    max_steps: 20
    score_range: [0.0, 1.0]
    grader: "30% resolution + 25% critical + 15% F1 + 15% resource + 15% counterfactual"

  - name: task3_cascade_hard
    difficulty: hard
    description: >
      5 zones, 17 reports (4 critical, 2 duplicates, 3 false), 6 resources.
      Deep flooding, multiple blockages and blackouts, fuel constraints.
      Full grading: resolution, critical, F1, resource matching, monitoring,
      and counterfactual penalty.
    max_steps: 30
    score_range: [0.0, 1.0]
    grader: "30% resolution + 25% critical + 15% F1 + 10% resource + 10% monitoring + 10% counterfactual"

# ---------------------------------------------------------------------------
# API endpoints (served by app.py)
# ---------------------------------------------------------------------------
endpoints:
  health:
    method: GET
    path: /
    description: "Health check. Returns {status: ok}."
  tasks:
    method: GET
    path: /tasks
    description: "List all supported task names."
  reset:
    method: POST
    path: /reset
    description: "Start a new episode. Body: {task_name: string, seed: int}"
  step:
    method: POST
    path: /step
    description: "Advance one step. Body: {tool: string, args: object}"
  state:
    method: GET
    path: /state
    description: "Return current internal state snapshot."
  grade:
    method: POST
    path: /grade
    description: "Grade the completed episode. Returns {score, task_name, ...}."

runtime:
  port: 7860
  inference_timeout_minutes: 20
  max_vcpu: 2
  max_memory_gb: 8
